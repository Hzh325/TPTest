    let currentDetailId = null;

// 数据服务
    
    // UI渲染器
    const renderer = {
        async renderCandidates() {
            const container = document.getElementById('candidatesContainer');
            const loading = document.getElementById('loadingContainer');
            if (!container || !loading) return;
            
            try {
                utils.showLoading('loadingContainer');
                
                const [candidates, votes] = await Promise.all([
                    dataService.getCandidates(dataService.currentPage),
                    dataService.getVotes(),
                ]);
                
                dataService.updatePagination();
                
                if (candidates.length === 0) {
                    container.innerHTML = `
                        <div class="no-results">
                            <i class="fas fa-search"></i>
                            <h3>未找到匹配的人物</h3>
                            <p>尝试使用不同的搜索词或浏览其他页面</p>
                        </div>
                    `;
                } else {
                    container.innerHTML = candidates.map(candidate => {
                        return `
                            <div class="candidate-card" data-id="${candidate.id}">
                                <div class="image-container">
                                    <img src="${candidate.image_url || 'https://via.placeholder.com/400x250?text=无图片'}" 
                                         alt="${candidate.name}" 
                                         class="candidate-image"
                                         onerror="this.onerror=null;this.src='https://via.placeholder.com/400x250?text=图片加载失败'">
                                </div>
                                <div class="candidate-info">
                                    <h3 class="candidate-name">${candidate.name}</h3>
                                    <p class="candidate-description">${candidate.description || '暂无描述'}</p>
                                    
                                    <div class="vote-count">
                                        <i class="fas fa-vote-yea"></i> 票数: ${candidate.votes || 0}
                                    </div>
                                    
                                    <div class="action-buttons">
                                        <button class="vote-btn" onclick="app.voteForCandidate(${candidate.id})" 
                                            ${utils.getVoteCount() <= 0 ? 'disabled' : ''}>
                                            ${utils.getVoteCount() <= 0 ? '无投票机会' : '投票'}
                                        </button>
                                        <button class="detail-btn" onclick="app.showDetail(${candidate.id})">
                                            详情 <i class="fas fa-chevron-right"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');
                }
                
                document.getElementById('currentYear').textContent = utils.getCurrentYear();
                container.style.display = 'grid';
            } catch (error) {
                console.error('渲染候选人失败:', error);
                container.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:red;padding:20px;">数据加载失败，请刷新页面</p>';
                container.style.display = 'block';
            } finally {
                utils.hideLoading('loadingContainer');
            }
        },
        
async renderComments() {
    const container = document.getElementById('commentsList');
    const loading = document.getElementById('commentsLoading');
    if (!container || !loading) return;
    
    try {
        utils.showLoading('commentsLoading');
        
        const comments = await dataService.getLatestComments(20);
        
        if (comments.length === 0) {
            container.innerHTML = `
                <div class="comment-item" style="text-align: center; padding: 30px;">
                    <i class="fas fa-comment-dots" style="font-size: 2rem; color: #ddd; margin-bottom: 10px;"></i>
                    <p style="color: #999;">暂无留言，成为第一个留言的人吧！</p>
                </div>
            `;
        } else {
            container.innerHTML = comments.map((comment, index) => {
                // 自动识别并转换链接
                const contentWithLinks = comment.content.replace(
                    /(https?:\/\/[^\s]+)/g, 
                    '<a href="$1" target="_blank" rel="nofollow">$1</a>'
                );
                
                // 楼层号（倒序）
                const floor = comments.length - index;
                
                return `
                    <div class="comment-item" id="comment-${comment.id}">
                        <div class="comment-header">
                            <span class="comment-author">
                                <i class="fas fa-user-circle"></i> ${comment.user_name}
                                <span class="global-comment-label">全局</span>
                                <span class="floor-number">#${floor}</span>
                            </span>
                            <span class="comment-date">
                                ${utils.formatDate(comment.created_at)}
                            </span>
                        </div>
                        <div class="comment-content">
                            ${contentWithLinks}
                        </div>
                        <div class="comment-actions">
                            <button class="reply-btn" onclick="app.setReplyTarget('${comment.user_name}')">
                                <i class="fas fa-reply"></i> 回复
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }
    } catch (error) {
        console.error('渲染留言失败:', error);
        container.innerHTML = '<p style="text-align:center;color:red;padding:10px;">留言加载失败</p>';
    } finally {
        utils.hideLoading('commentsLoading');
    }
},

async renderForumPosts() {
    const container = document.getElementById('forumPostsContainer');
    const loading = document.getElementById('forumLoading');
    if (!container || !loading) return;
    
    try {
        loading.style.display = 'block';
        container.innerHTML = '';
        
        // 获取搜索和排序参数
        const searchTerm = document.getElementById('forumSearchInput')?.value || '';
        const sortBy = document.getElementById('forumSortSelect')?.value || 'time';
        
        // 如果尚未加载所有帖子，则加载
        if (dataService.allForumPosts.length === 0) {
            await dataService.loadAllForumPosts();
        }
        
        const posts = dataService.getFilteredPosts(searchTerm, sortBy);
        
        if (posts.length === 0) {
            container.innerHTML = `
                <div class="no-results">
                    <i class="fas fa-comments"></i>
                    <h3>暂无帖子</h3>
                    <p>成为第一个发布帖子的人吧！</p>
                </div>
            `;
        } else {
            container.innerHTML = posts.map(post => {
                // 保持原有帖子渲染代码不变
                const imageHtml = post.image_count > 0 ? 
                    `<div style="display: flex; gap: 5px; margin: 10px 0; flex-wrap: wrap;">
                        ${Array(post.image_count).fill(0).map((_, i) => `
                            <div style="width: 60px; height: 60px; background: #f5f5f5; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #999; border: 1px solid #ddd;">
                                <i class="fas fa-image" style="font-size: 20px;"></i>
                            </div>
                        `).join('')}
                    </div>` : '';
                
                return `
                    <div class="forum-post" onclick="window.location.href='forum-detail.html?id=${post.id}'">
                        <div class="forum-post-header">
                            <span class="forum-post-author">
                                <i class="fas fa-user-circle"></i> ${post.user_name}
                            </span>
                            <span class="forum-post-date">
                                ${utils.formatDate(post.created_at)}
                            </span>
                        </div>
                        <h3 class="forum-post-title">${post.title}</h3>
                        <p class="forum-post-content">${post.content.substring(0, 100)}${post.content.length > 100 ? '...' : ''}</p>
                        ${imageHtml}
                        <div class="forum-post-stats">
                            <span><i class="fas fa-eye"></i> ${post.views || 0}</span>
                            <span><i class="fas fa-comment"></i> ${post.comments || 0}</span>
                            <span><i class="fas fa-heart"></i> ${post.likes || 0}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }
    } catch (error) {
        console.error('渲染论坛帖子失败:', error);
        container.innerHTML = '<p style="text-align:center;color:red;padding:20px;">加载失败</p>';
    } finally {
        loading.style.display = 'none';
    }
},

        updateVoteButtons() {
            const voteCount = utils.getVoteCount();
            document.querySelectorAll('.vote-btn').forEach(btn => {
                btn.disabled = voteCount <= 0;
                btn.textContent = voteCount <= 0 ? '无投票机会' : '投票';
            });
            
            const badge = document.getElementById('voteCountBadge');
            if (voteCount > 0) {
                badge.textContent = voteCount;
                badge.style.display = 'flex';
            } else {
                badge.style.display = 'none';
            }
        }
    };
    
    // 应用控制器
    const app = {
            isCheckingIn: false,

cachedStyles: null,
isCustomMode: false,  // 当前是否处于自定义模式
customSettings: null, // 当前自定义设置（前端格式）

    if (!supabaseClient) return;
    const { data, error } = await supabaseClient.from('styles').select('*').order('name');
    if (error) {

        return;

    const title = document.getElementById('feedbackTitle').value.trim();

            }]);

        alert('反馈提交成功！感谢您的支持。');

        console.error('提交反馈失败:', err);

async checkin() {
    if (this.isCheckingIn) return;
    this.isCheckingIn = true;
    const user = utils.getCurrentUser();
    if (!user) {
        alert('请先登录后再签到');
        this.showAuthModal();
        this.isCheckingIn = false;
        return;
    }
    const lastCheckinDate = utils.getLastCheckinDate();
    const today = new Date().toISOString().split('T')[0];
    if (lastCheckinDate && utils.isSameDay(lastCheckinDate, today)) {
        alert('您今天已经签到过了，明天再来吧！');
        this.isCheckingIn = false;
        return;
    }
    try {
        utils.setLastCheckinDate(today);
        const newCount = utils.incrementVoteCount();
        renderer.updateVoteButtons();
        alert(`签到成功！您获得了1次投票机会，当前共有${newCount}次投票机会`);
    } catch (error) {
        console.error('签到失败:', error);
        alert('签到失败，请重试');
    } finally {
        setTimeout(() => { this.isCheckingIn = false; }, 1000);
    }
},

checkAuth() {
    const token = localStorage.getItem('authToken');
    const userStr = localStorage.getItem('currentUser');
    
    if (token && userStr) {
        try {
            const user = JSON.parse(userStr);
            if (user && user.username) {
                utils.setAuthStatus(user.username);
                
                // 确保签到按钮显示
                const checkinBtn = document.getElementById('checkinBtn');
                if (checkinBtn) {
                    checkinBtn.style.display = 'flex';
                    this.checkCheckinStatus();
                }
                
                // 确保有投票机会计数
                if (!localStorage.getItem('voteCount')) {
                    utils.setVoteCount(0);
                }
            }
        } catch (e) {
            console.error('解析用户数据失败:', e);
            // 清除无效数据
            localStorage.removeItem('currentUser');
            localStorage.removeItem('authToken');
        }
    }
},

async checkin() {
    if (this.isCheckingIn) return;
    this.isCheckingIn = true;

    const user = utils.getCurrentUser();
    if (!user) {
        alert('请先登录后再签到');
        this.showAuthModal();
        this.isCheckingIn = false;
        return;
    }

    const lastCheckinDate = utils.getLastCheckinDate();
    const today = new Date().toISOString().split('T')[0];

    if (lastCheckinDate && utils.isSameDay(lastCheckinDate, today)) {
        alert('您今天已经签到过了，明天再来吧！');
        this.isCheckingIn = false;
        return;
    }

    try {
        utils.setLastCheckinDate(today);
        const newCount = utils.incrementVoteCount();
        renderer.updateVoteButtons();
        alert(`签到成功！您获得了1次投票机会，当前共有${newCount}次投票机会`);
    } catch (error) {
        console.error('签到失败:', error);
        alert('签到失败，请重试');
    } finally {
        setTimeout(() => { this.isCheckingIn = false; }, 1000);
    }
},
        
checkCheckinStatus() {
    const user = utils.getCurrentUser();
    if (!user) return;
    
    const lastCheckinDate = utils.getLastCheckinDate();
    const today = new Date().toISOString().split('T')[0];
    
    const checkinBtn = document.getElementById('checkinBtn');
    if (!checkinBtn) return;
    
    // 如果没有签到记录，或者上次签到不是今天
    if (!lastCheckinDate || !utils.isSameDay(lastCheckinDate, today)) {
        checkinBtn.disabled = false;
    } else {
        checkinBtn.disabled = true;
    }
    
    // 更新投票机会显示
    renderer.updateVoteButtons();
},

async showSettings() {
    const modal = document.getElementById('settingsModal');
    if (!modal) return;
    modal.style.display = 'flex';

    // 加载当前风格（可能是预设或自定义）
    const user = utils.getCurrentUser();
    let currentStyle = null;
    let isCustom = false;
    if (user) {
        // 从 user_preferences 获取 style_id 和 custom_settings
        const { data: pref } = await supabaseClient
            .from('user_preferences')
            .select('style_id, custom_settings')
            .eq('user_id', user.id)
            .maybeSingle();
if (pref) {
    if (pref.style_id) {
        // 预设风格
        const style = await styleService.getCurrentUserStyle();
        if (style) currentStyle = style;
        isCustom = false;
    } else if (pref.custom_settings) {
        // 自定义风格：custom_settings 可能是对象或字符串
        let custom = pref.custom_settings;
        if (typeof custom === 'string') {
            try { custom = JSON.parse(custom); } catch (e) {}
        }
        // 构造一个包含 name 和前端字段的对象
        currentStyle = {
            name: '自定义',
            bg_color: custom.bgColor,
            bgImageUrl: custom.bgImageUrl,
            bgBlur: custom.bgBlur,
            header_opacity: custom.headerOpacity,
            main_opacity: custom.mainOpacity,
            comments_opacity: custom.commentsOpacity,
            card_opacity: custom.cardOpacity
        };
        isCustom = true;
    }
}
        if (!currentStyle) {
            // 回退到默认预设
            const defaultStyle = await styleService.getDefaultStyle();
            currentStyle = defaultStyle;
            isCustom = false;
        }
} else {
    // 未登录，从 localStorage 读取
    const defaultCached = localStorage.getItem('userSettings_default');
    if (defaultCached) {
        try {
            const settings = JSON.parse(defaultCached);
            currentStyle = {
                name: '自定义',
                bg_color: settings.bgColor,
                bgImageUrl: settings.bgImageUrl,
                bgBlur: settings.bgBlur,
                header_opacity: settings.headerOpacity,
                main_opacity: settings.mainOpacity,
                comments_opacity: settings.commentsOpacity,
                card_opacity: settings.cardOpacity
            };
            isCustom = true;
        } catch (e) {}
    }
    if (!currentStyle) {
        const defaultStyle = await styleService.getDefaultStyle();
        currentStyle = defaultStyle;
    }
}

    this.updateCurrentStyleDisplay(currentStyle);
    this.isCustomMode = isCustom;

    // 控制自定义面板显示
    const customPanel = document.getElementById('customStylePanel');
    if (isCustom) {
        customPanel.style.display = 'block';
        this.syncSlidersToSettings(currentStyle);
    } else {
        customPanel.style.display = 'none';
    }

    // 关闭按钮
    const closeBtn = document.querySelector('.close-settings');
    if (closeBtn) {
        closeBtn.onclick = () => {
            modal.style.display = 'none';
        };
    }

    // 切换风格按钮
    const switchBtn = document.getElementById('switchStyleBtn');
    if (switchBtn) {
        switchBtn.onclick = () => {
            this.toggleStyleSelector();
        };
    }

    // 自定义面板中的保存按钮
    document.getElementById('saveCustomStyle')?.addEventListener('click', () => {
        // 从滑块获取当前值
        const newSettings = {
            bgColor: document.getElementById('bgColor').value,
            bgImageUrl: document.getElementById('bgImageUrl').value,
            bgBlur: parseFloat(document.getElementById('bgBlur').value),
            headerOpacity: parseFloat(document.getElementById('headerOpacity').value),
            mainOpacity: parseFloat(document.getElementById('mainOpacity').value),
            commentsOpacity: parseFloat(document.getElementById('commentsOpacity').value),
            cardOpacity: parseFloat(document.getElementById('cardOpacity').value)
        };

        alert('自定义风格已保存');
    });

    // 重置为默认（灰色背景）
    document.getElementById('resetCustomStyle')?.addEventListener('click', () => {
        const defaultSettings = {
            bgColor: '#f5f5f5',
            bgImageUrl: '',
            bgBlur: 0,
            headerOpacity: 1,
            mainOpacity: 1,
            commentsOpacity: 1,
            cardOpacity: 1
        };
        this.syncSlidersToSettings(defaultSettings);
        utils.applySettings(defaultSettings);
        // 可选：自动保存

    // 滑块实时预览
    const sliders = ['bgColor', 'bgImageUrl', 'bgBlur', 'headerOpacity', 'mainOpacity', 'commentsOpacity', 'cardOpacity'];
    sliders.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
            el.addEventListener('input', () => {
                const currentSettings = {
                    bgColor: document.getElementById('bgColor').value,
                    bgImageUrl: document.getElementById('bgImageUrl').value,
                    bgBlur: parseFloat(document.getElementById('bgBlur').value),
                    headerOpacity: parseFloat(document.getElementById('headerOpacity').value),
                    mainOpacity: parseFloat(document.getElementById('mainOpacity').value),
                    commentsOpacity: parseFloat(document.getElementById('commentsOpacity').value),
                    cardOpacity: parseFloat(document.getElementById('cardOpacity').value)
                };
                utils.applySettings(currentSettings);
                // 更新显示值
                document.getElementById('bgBlurValue').textContent = currentSettings.bgBlur + 'px';
                document.getElementById('headerOpacityValue').textContent = Math.round(currentSettings.headerOpacity * 100) + '%';
                document.getElementById('mainOpacityValue').textContent = Math.round(currentSettings.mainOpacity * 100) + '%';
                document.getElementById('commentsOpacityValue').textContent = Math.round(currentSettings.commentsOpacity * 100) + '%';
                document.getElementById('cardOpacityValue').textContent = Math.round(currentSettings.cardOpacity * 100) + '%';
            });

    // 点击外部关闭

            modal.style.display = 'none';
        }
    };
},



applySettings(settings) {
    if (!settings) return;
    // 背景颜色
    if (settings.bgColor) {
        document.body.style.backgroundColor = settings.bgColor;
    } else {
        document.body.style.backgroundColor = '#f5f5f5';   // 默认灰色
    }
    // 背景图片
    if (settings.bgImageUrl && settings.bgImageUrl.trim() !== '') {
        document.body.style.backgroundImage = `url('${settings.bgImageUrl}')`;
        document.body.style.backgroundSize = 'cover';
        document.body.style.backgroundAttachment = 'fixed';
        document.body.style.backgroundPosition = 'center';
        document.body.style.backgroundRepeat = 'no-repeat';
    } else {
        document.body.style.backgroundImage = '';
        document.body.style.backgroundSize = '';
        document.body.style.backgroundAttachment = '';
        document.body.style.backgroundPosition = '';
        document.body.style.backgroundRepeat = '';
    }
    // 背景模糊
    if (settings.bgBlur) {
        document.body.style.backdropFilter = `blur(${settings.bgBlur}px)`;
    } else {
        document.body.style.backdropFilter = '';
    }
    // 透明度设置（保持不变）
    const header = document.querySelector('header');
    if (header) {
        header.style.backgroundColor = `rgba(255, 255, 255, ${settings.headerOpacity || 1})`;
        header.style.backdropFilter = settings.headerOpacity < 1 ? 'blur(5px)' : 'none';
    }
    
    const mainContent = document.querySelector('.main-content');
    if (mainContent) {
        mainContent.style.backgroundColor = `rgba(255, 255, 255, ${settings.mainOpacity || 1})`;
        mainContent.style.backdropFilter = settings.mainOpacity < 1 ? 'blur(5px)' : 'none';
    }
    
    const commentsPanel = document.querySelector('.comments-panel');
    if (commentsPanel) {
        commentsPanel.style.backgroundColor = `rgba(255, 255, 255, ${settings.commentsOpacity || 1})`;
        commentsPanel.style.backdropFilter = settings.commentsOpacity < 1 ? 'blur(5px)' : 'none';
    }
    
    const cards = document.querySelectorAll('.candidate-card');
    cards.forEach(card => {
        card.style.backgroundColor = `rgba(255, 255, 255, ${settings.cardOpacity || 1})`;
        card.style.backdropFilter = settings.cardOpacity < 1 ? 'blur(5px)' : 'none';
    });
},

customTile.addEventListener('click', () => {

            .from('user_preferences')

            .maybeSingle()

            });
    } else {
        // 未登录，从 localStorage 读取
        const defaultCached = localStorage.getItem('userSettings_default');
        let settings;
        if (defaultCached) {
            try {
                settings = JSON.parse(defaultCached);
            } catch (e) {
                settings = {
                    bgColor: '#f5f5f5',
                    bgImageUrl: '',
                    bgBlur: 0,
                    headerOpacity: 1,
                    mainOpacity: 1,
                    commentsOpacity: 1,
                    cardOpacity: 1
                };
            }
        } else {
            settings = {
                bgColor: '#f5f5f5',
                bgImageUrl: '',
                bgBlur: 0,
                headerOpacity: 1,
                mainOpacity: 1,
                commentsOpacity: 1,
                cardOpacity: 1
            };

    }
});

        });

toggleStyleSelector() {
    const dropdown = document.getElementById('styleSelectorDropdown');
    if (!dropdown) return;
    if (dropdown.style.display === 'flex') {
        dropdown.style.display = 'none';
        return;
    }
    dropdown.style.display = 'flex';
    if (!this.cachedStyles) {
        this.loadStyles().then(() => {
            this.renderStyleSelector(this.cachedStyles);
        });
    } else {
        this.renderStyleSelector(this.cachedStyles);
    }
},

async applyStyle(style) {
    if (!style) return;
    // 如果是预设风格
    const frontendStyle = utils.convertDbStyleToFrontend(style);
    utils.applySettings(frontendStyle);
    const user = utils.getCurrentUser();
    if (user) {
        // 保存 style_id 到 user_preferences
        await supabaseClient
            .from('user_preferences')
            .upsert({ user_id: user.id, style_id: style.id, updated_at: new Date().toISOString() }, { onConflict: 'user_id' });
        // 同时缓存前端格式
        localStorage.setItem(`userSettings_${user.id}`, JSON.stringify(frontendStyle));
    } else {
        localStorage.setItem('userSettings_default', JSON.stringify(frontendStyle));
    }
    this.isCustomMode = false;
    this.updateCurrentStyleDisplay(style);
    // 隐藏自定义调节面板
    document.getElementById('customStylePanel').style.display = 'none';
    alert(`已应用风格：${style.name}`);
},

updateCurrentStyleDisplay(style) {
    const nameEl = document.getElementById('currentStyleName');
    const colorPreview = document.getElementById('currentStyleColor');
    const detailsEl = document.getElementById('currentStyleDetails');
    if (!style) {
        nameEl.textContent = '默认风格';
        colorPreview.style.backgroundColor = '#f5f5f5';
        detailsEl.textContent = '背景颜色、透明度等';
        return;
    }
    nameEl.textContent = style.name || '未知风格';
    // 兼容数据库格式 (bg_color) 和前端格式 (bgColor)
    const bgColor = style.bg_color || style.bgColor || '#f5f5f5';
    colorPreview.style.backgroundColor = bgColor;
    const headerOpacity = style.header_opacity || style.headerOpacity || 1;
    detailsEl.textContent = `背景色: ${bgColor}, 透明度: 头部 ${headerOpacity}`;
},

applyCustomStyle(settings) {
    if (!settings) return;
    utils.applySettings(settings);
    const user = utils.getCurrentUser();
    if (user) {
        supabaseClient
            .from('user_preferences')
            .upsert({
                user_id: user.id,
                style_id: null,
                custom_settings: settings,
                updated_at: new Date().toISOString()
            }, { onConflict: 'user_id' })
            .then(() => {
                localStorage.setItem(`userSettings_${user.id}`, JSON.stringify(settings));
            });
    } else {
        localStorage.setItem('userSettings_default', JSON.stringify(settings));
    }
    this.isCustomMode = true;
    this.customSettings = settings;
    this.updateCurrentStyleDisplay({
        name: '自定义',
        bg_color: settings.bgColor,
        header_opacity: settings.headerOpacity
    });
    document.getElementById('customStylePanel').style.display = 'block';
    this.syncSlidersToSettings(settings);
},

syncSlidersToSettings(settings) {
    document.getElementById('bgColor').value = settings.bgColor || '#f5f5f5';
    document.getElementById('bgImageUrl').value = settings.bgImageUrl || '';
    document.getElementById('bgBlur').value = settings.bgBlur || 0;
    document.getElementById('bgBlurValue').textContent = (settings.bgBlur || 0) + 'px';
    document.getElementById('headerOpacity').value = settings.headerOpacity || 1;
    document.getElementById('headerOpacityValue').textContent = Math.round((settings.headerOpacity || 1) * 100) + '%';
    document.getElementById('mainOpacity').value = settings.mainOpacity || 1;
    document.getElementById('mainOpacityValue').textContent = Math.round((settings.mainOpacity || 1) * 100) + '%';
    document.getElementById('commentsOpacity').value = settings.commentsOpacity || 1;
    document.getElementById('commentsOpacityValue').textContent = Math.round((settings.commentsOpacity || 1) * 100) + '%';
    document.getElementById('cardOpacity').value = settings.cardOpacity || 1;
    document.getElementById('cardOpacityValue').textContent = Math.round((settings.cardOpacity || 1) * 100) + '%';
},
};
